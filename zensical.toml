# Zensical configuration for the substrait-java documentation.
# Docs: https://zensical.org/docs/
#
# Build:  pixi run docs-build   (or: zensical build)
# Serve:  pixi run docs-serve   (or: zensical serve)

[project]
site_name = "substrait-java"
site_description = "Java implementation of Substrait: build, convert, and serialize relational query plans."
site_author = "Substrait contributors"
# Canonical hosting URL. Required for multi-version docs: each version is
# published as a subdirectory of this URL. Adjust if the site is served
# elsewhere (custom domain, or a fork's *.github.io while testing).
site_url = "https://substrait-io.github.io/substrait-java/"
repo_url = "https://github.com/substrait-io/substrait-java"
repo_name = "substrait-io/substrait-java"
copyright = "Copyright &copy; 2026 Substrait contributors"

nav = [
  { "Home" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "Core" = [
    "core/index.md",
    { "Building plans" = "core/building-plans.md" },
    { "Types" = "core/types.md" },
    { "Expressions & literals" = "core/expressions.md" },
    { "Relations" = "core/relations.md" },
    { "Serialization" = "core/serialization.md" },
    { "Extended expressions" = "core/extended-expressions.md" },
    { "Function & type extensions" = "core/extensions.md" },
  ] },
  { "Isthmus (SQL)" = [
    "isthmus/index.md",
    { "SQL to Substrait" = "isthmus/sql-to-substrait.md" },
    { "SQL expressions" = "isthmus/sql-expressions.md" },
    { "Substrait to SQL" = "isthmus/substrait-to-sql.md" },
    { "Substrait to Calcite" = "isthmus/substrait-to-calcite.md" },
    { "Types & type system" = "isthmus/types.md" },
    { "Customization" = "isthmus/customization.md" },
    { "Supported SQL" = "isthmus/supported-sql.md" },
  ] },
  { "Isthmus CLI" = [
    "isthmus-cli/index.md",
    { "Install & build" = "isthmus-cli/install.md" },
    { "Usage" = "isthmus-cli/usage.md" },
    { "Examples" = "isthmus-cli/examples.md" },
  ] },
  { "Spark" = [
    "spark/index.md",
    { "Compatibility & dependencies" = "spark/compatibility.md" },
    { "Producing plans" = "spark/producing-plans.md" },
    { "Consuming plans" = "spark/consuming-plans.md" },
    { "Supported features" = "spark/supported-features.md" },
    { "End-to-end example" = "spark/end-to-end.md" },
  ] },
]

# --------------------------------------------------------------------------
# Multi-version documentation (via the Zensical-compatible `mike` fork).
# Publishing is done by .github/workflows/docs-deploy.yml, which commits each
# version to the `gh-pages` branch as a subdirectory of site_url. Setting the
# provider here renders the version selector in the header.
# --------------------------------------------------------------------------
[project.extra.version]
provider = "mike"   # enables the selector; reads mike's versions.json on gh-pages
default = "latest"  # the alias the site root redirects to
alias = true

# --------------------------------------------------------------------------
# Theme (Material-style; ships with Zensical).
# --------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.tabs.link",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/substrait-io/substrait-java"

[[project.extra.social]]
icon = "fontawesome/brands/java"
link = "https://central.sonatype.com/namespace/io.substrait"

# --------------------------------------------------------------------------
# Markdown extensions (Zensical defaults + what the guide relies on).
# --------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
