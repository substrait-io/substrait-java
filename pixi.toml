# pixi workspace for the substrait-java documentation site.
#
# The docs are built with Zensical (https://zensical.org) from the Markdown
# sources under `docs/`, configured by `zensical.toml`. Multi-version publishing
# uses the Zensical-compatible fork of `mike`. This mirrors the tooling used by
# substrait-python so the two repositories stay consistent.
#
# Local usage:
#   pixi run docs-serve    # live-reloading preview at http://localhost:8000
#   pixi run docs-build    # build the static site into ./site
#
# Versioned publishing is done in CI (.github/workflows/docs-deploy.yml) via
# `pixi run -e docs mike ...`.

[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64", "linux-aarch64"]

[feature.docs.dependencies]
# conda-provided interpreter that the PyPI dependencies below resolve against
python = "3.12.*"

[feature.docs.pypi-dependencies]
zensical = "*"
# Zensical-compatible fork of mike (not published on PyPI). Pin to a commit SHA
# here if an upstream change ever breaks the build.
mike = { git = "https://github.com/squidfunk/mike.git" }

[feature.docs.tasks]
docs-build = "zensical build --clean"
docs-serve = "zensical serve"

[environments]
docs = ["docs"]
